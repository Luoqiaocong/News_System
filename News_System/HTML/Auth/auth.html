<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>欢迎来到Seven新闻</title>
    <link rel="stylesheet" href="../../CSS/login.css">
    <script src="../../JS/user.js"></script>
</head>
<body>
    <div class="page-background"></div>

    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form action="#" onsubmit="event.preventDefault(); doRegister();">
                <h1>创建账号</h1>
                <input type="email" id="email" placeholder="电子邮箱" required />
                <input type="password" id="password" placeholder="密码" required oninput="validatePasswordRealTime()" />
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="bar" id="bar1"></div>
                        <div class="bar" id="bar2"></div>
                        <div class="bar" id="bar3"></div>
                        <div class="bar" id="bar4"></div>
                    </div>
                    <span id="strength-text" class="strength-text">请输入密码</span>
                </div>
                <p id="password-hint" class="password-hint">密码要求：至少8位，包含小写、大写字母和特殊字符</p>
                <input type="password" id="confirm-password" placeholder="确认密码" required />
                <button type="submit" class="main-btn">注册</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form action="#" onsubmit="event.preventDefault(); doLogin();">
                <h1>登录</h1>
                <input type="email" id="login-email" placeholder="电子邮箱" />
                <input type="password" id="login-password" placeholder="密码" />
                <a href="#" class="forget-pwd">忘记密码？</a>
                <button type="submit" class="main-btn">登录</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>欢迎回来！</h1>
                    <p>已有账号，立即登录！</p>
                    <button class="ghost-btn" id="signIn">立即登录</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>你好，朋友！</h1>
                    <p>还没有账号？快来注册吧！</p>
                    <button class="ghost-btn" id="signUp">立即注册</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 自定义消息弹窗 -->
    <div id="message-modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon" id="modal-icon">✓</div>
            <h3 id="modal-title">提示</h3>
            <p id="modal-message">消息内容</p>
            <button class="modal-btn" onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });

        // 显示消息弹窗
        function showModal(title, message, type = 'success') {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal-icon').textContent = type === 'success' ? '✓' : '✕';
            document.getElementById('message-modal').style.display = 'flex';
            document.getElementById('modal-icon').className = 'modal-icon ' + type;
        }

        // 关闭消息弹窗
        function closeModal() {
            document.getElementById('message-modal').style.display = 'none';
        }

        // 微信登录（待实现）
        function wechatLogin() {
            showModal('提示', '微信登录功能正在开发中...', 'error');
        }
    </script>
</body>
</html>
