<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新闻详情 - Seven新闻</title>
  <link rel="icon" href="img/news.ico" />
  <link rel="stylesheet" href="css/style.css" />
  <script>
    (function(){var t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <script src="js/vue.global.prod.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <div class="header-logo" @click="goHome">
          <span class="logo-icon">S</span>
          <span>Seven新闻</span>
        </div>
        <div class="header-actions">
          <button class="theme-toggle-btn" @click="toggleDark" title="切换主题">🌙</button>
          <span class="header-nickname" v-if="loggedIn">{{ user.nickname || user.email?.split('@')[0] }}</span>
          <img
            v-if="loggedIn"
            :src="avatarSrc"
            class="header-avatar"
            @click="goHome"
            title="返回首页"
          />
        </div>
      </div>
    </header>

    <!-- Loading -->
    <div class="loading" v-if="loading" style="margin-top:60px">
      <span class="spinner"></span> 加载中...
    </div>

    <!-- Not Found -->
    <div class="container" v-else-if="!detail">
      <div class="empty">
        <div class="empty-icon">📄</div>
        <div class="empty-text">新闻不存在</div>
        <button class="btn btn-primary mt-24" @click="goHome">回到首页</button>
      </div>
    </div>

    <!-- Detail Content -->
    <main class="container" v-else>
      <a class="back-link" @click="goBack">← 返回</a>

      <article style="max-width:800px;margin:0 auto">
        <h1 style="font-size:28px;font-weight:700;line-height:1.5;margin-bottom:20px;color:var(--gray-900)">{{ detail.title }}</h1>

        <div style="display:flex;align-items:center;gap:16px;font-size:13px;color:var(--gray-500);margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--gray-200)">
          <span style="font-weight:500;color:var(--gray-700)">{{ detail.author }}</span>
          <span>{{ formatDate(detail.publish_time) }}</span>
          <span>{{ detail.views }} 阅读</span>
          <button
            v-if="loggedIn"
            @click="toggleFavorite"
            class="fav-inline"
            :class="{ active: isFavorited }"
          >
            {{ isFavorited ? '❤️' : '🤍' }}
            {{ isFavorited ? '已收藏' : '收藏' }}
          </button>
        </div>

        <img v-if="detail.thumbnail" :src="detail.thumbnail" :alt="detail.title"
          style="width:100%;max-height:400px;object-fit:cover;border-radius:12px;margin-bottom:28px" />

        <div style="font-size:16px;line-height:2;color:var(--gray-700);word-break:break-word"
          v-html="detail.content"></div>

        <div class="share-bar">
          <span class="share-label">分享到</span>
          <button class="share-btn" @click="copyLink" title="复制链接">📋</button>
          <button class="share-btn" @click="shareWeibo" title="分享到微博">🌐</button>
          <button class="share-btn" @click="shareMore" title="更多分享">🔗</button>
        </div>

      </article>

      <!-- Related News -->
      <section style="max-width:800px;margin:40px auto 0;padding-top:28px;border-top:1px solid var(--gray-200)" v-if="relatedNews.length > 0">
        <h3 style="font-size:18px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px">
          <span style="display:inline-block;width:4px;height:20px;background:var(--primary-gradient);border-radius:2px"></span>
          相关推荐
        </h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px">
          <div v-for="r in relatedNews" :key="r.id"
            style="background:white;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:all var(--transition);border:1px solid transparent"
            @click="goDetail(r.id)"
            @mouseenter="$event.currentTarget.style.borderColor='rgba(37,99,235,0.2)';$event.currentTarget.style.transform='translateY(-2px)'"
            @mouseleave="$event.currentTarget.style.borderColor='transparent';$event.currentTarget.style.transform='translateY(0)'"
          >
            <img v-if="r.thumbnail" :src="r.thumbnail" :alt="r.title" style="width:100%;height:130px;object-fit:cover" />
            <div v-else style="width:100%;height:130px;background:linear-gradient(135deg,#2563eb20,#7c3aed20);display:flex;align-items:center;justify-content:center;font-size:32px">📄</div>
            <div style="padding:12px 14px">
              <div style="font-size:13px;font-weight:500;color:var(--gray-700);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5">{{ r.title }}</div>
              <div style="font-size:11px;color:var(--gray-400);margin-top:6px;display:flex;justify-content:space-between">
                <span>{{ r.author }}</span>
                <span>{{ r.views }} 阅读</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Toast -->
    <div v-if="toast.show" class="toast" :class="'toast-' + toast.type" @click="toast.show = false">{{ toast.message }}</div>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        const newsId = ref(null);
        const detail = ref(null);
        const relatedNews = ref([]);
        const isFavorited = ref(false);
        const loading = ref(true);
        const loggedIn = ref(false);
        const user = ref({});
        const toast = ref({ show: false, message: '', type: 'success' });

        const avatarSrc = computed(() => {
          if (user.value.avatar) return avatarUrl(user.value.avatar);
          return 'https://via.placeholder.com/38';
        });

        function showToast(msg, type = 'success') {
          toast.value = { show: true, message: msg, type };
          setTimeout(() => { toast.value.show = false; }, 3000);
        }

        function formatDate(dateStr) {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          const pad = n => String(n).padStart(2, '0');
          return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
        }

        async function fetchDetail() {
          try {
            const data = await NewsAPI.getDetail(newsId.value);
            if (data && data.detail) {
              detail.value = data.detail;
              relatedNews.value = data.related_news || data.relatedNews || [];
            } else if (data && data.id) {
              detail.value = data;
            }
          } catch (e) {
            showToast(e.message, 'error');
          } finally { loading.value = false; }
        }

        async function checkFavorite() {
          try {
            const data = await FavAPI.check(newsId.value);
            isFavorited.value = data ? data.is_fav : false;
          } catch (e) {}
        }

        async function toggleFavorite() {
          try {
            if (isFavorited.value) {
              await FavAPI.remove([newsId.value]);
              isFavorited.value = false;
              showToast('已取消收藏');
            } else {
              await FavAPI.add(newsId.value);
              isFavorited.value = true;
              showToast('收藏成功');
            }
          } catch (e) {
            showToast(e.message, 'error');
          }
        }

        // --- Share ---
        function copyLink() {
          const url = window.location.href;
          if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(() => showToast('链接已复制'));
          } else {
            showToast('复制失败，请手动复制浏览器地址栏', 'error');
          }
        }
        function shareWeibo() {
          const url = encodeURIComponent(window.location.href);
          const title = encodeURIComponent(detail.value?.title || '');
          window.open('https://service.weibo.com/share/share.php?url=' + url + '&title=' + title, '_blank');
        }
        function shareMore() {
          const url = window.location.href;
          const title = detail.value?.title || '';
          if (navigator.share) {
            navigator.share({ title, url }).catch(() => {});
          } else {
            copyLink();
          }
        }

        function goDetail(id) {
          window.location.href = 'detail.html?id=' + id;
        }

        function goHome() {
          window.location.href = 'index.html';
        }

        function goBack() {
          if (window.history.length > 1) {
            window.history.back();
          } else {
            window.location.href = 'index.html';
          }
        }
        function toggleDark() { toggleTheme(); }

        onMounted(async () => {
          const params = new URLSearchParams(window.location.search);
          newsId.value = parseInt(params.get('id')) || 0;
          if (!newsId.value) { loading.value = false; return; }
          initTheme();

          if (window.isLoggedIn()) {
            loggedIn.value = true;
            try { user.value = await loadUserData(); } catch (e) { setTokens(null, null); loggedIn.value = false; }
          }

          await fetchDetail();
          if (loggedIn.value) checkFavorite();
        });

        return {
          detail, relatedNews, isFavorited, loading, loggedIn, user, avatarSrc, toast,
          formatDate, toggleFavorite, goBack, goDetail, toggleDark, copyLink, shareWeibo, shareMore,
        };
      },
    }).mount('#app');
  </script>
</body>
</html>
