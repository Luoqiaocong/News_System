<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>搜索 - Seven新闻</title>
  <link rel="icon" href="img/news.ico" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/vue.global.prod.js"></script>
  <script src="js/api.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <div class="header-logo" @click="goHome">
          <span class="logo-icon">S</span>
          <span>Seven新闻</span>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost btn-sm" @click="goHome">← 返回首页</button>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="search-bar-page">
        <div class="search-bar-main">
          <input v-model="searchQuery" class="search-bar-input" placeholder="搜索关键词..." @keydown.enter="doSearch" />
          <input v-model="searchStartDate" type="date" class="search-bar-date" />
          <span class="search-bar-sep">至</span>
          <input v-model="searchEndDate" type="date" class="search-bar-date" />
          <button class="search-bar-btn" @click="doSearch">搜索</button>
          <button class="search-bar-clear" @click="clearSearch">清空</button>
        </div>
      </div>

      <div class="search-init" v-if="!searched && !loading">
        <div class="empty-circle"><span class="empty-emoji">🔍</span></div>
        <h3 class="empty-heading">搜索新闻</h3>
        <p class="empty-desc">输入关键词或选择日期范围开始搜索</p>
      </div>

      <div class="loading" v-if="loading"><span class="spinner"></span> 搜索中...</div>

      <div class="empty-state" v-else-if="searched && list.length === 0">
        <div class="empty-circle"><span class="empty-emoji">🔍</span></div>
        <h3 class="empty-heading">未找到相关新闻</h3>
        <p class="empty-desc">试试其他关键词或调整日期范围</p>
      </div>

      <template v-else-if="list.length > 0">
        <div style="margin-bottom:20px;font-size:14px;color:var(--gray-500);text-align:center">
          共 {{ total }} 条结果
        </div>
        <div class="news-grid">
          <div class="news-card" v-for="news in list" :key="news.id" @click="goDetail(news.id)">
            <img v-if="news.thumbnail" :src="news.thumbnail" :alt="news.title" class="news-card-thumb" />
            <div v-else class="news-card-thumb-placeholder">📰</div>
            <div class="news-card-body">
              <h3 class="news-card-title">{{ news.title }}</h3>
              <p class="news-card-summary">{{ news.summary || '暂无摘要' }}</p>
              <div class="news-card-meta">
                <span class="author">{{ news.author }}</span>
                <span>{{ news.views }} 阅读</span>
              </div>
            </div>
          </div>
        </div>

        <div class="pagination" v-if="totalPages > 1">
          <button class="page-btn" :disabled="page <= 1" @click="goPage(page - 1)">‹</button>
          <button v-for="p in pageNumbers" :key="p" class="page-btn" :class="{ active: p === page }" @click="goPage(p)">{{ p }}</button>
          <button class="page-btn" :disabled="page >= totalPages" @click="goPage(page + 1)">›</button>
        </div>
      </template>
    </main>

    <div v-if="toast.show" class="toast" :class="'toast-' + toast.type" @click="toast.show = false">{{ toast.message }}</div>
  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        const searchQuery = ref('');
        const searchStartDate = ref('');
        const searchEndDate = ref('');
        const categoryId = ref(0);
        const list = ref([]);
        const total = ref(0);
        const page = ref(1);
        const loading = ref(false);
        const searched = ref(false);
        const toast = ref({ show: false, message: '', type: 'success' });

        const totalPages = computed(() => Math.ceil(total.value / 6) || 0);
        const pageNumbers = computed(() => {
          const p = [];
          for (let i = 1; i <= totalPages.value; i++) p.push(i);
          return p;
        });

        function showToast(msg, type = 'success') {
          toast.value = { show: true, message: msg, type };
          setTimeout(() => { toast.value.show = false; }, 3000);
        }

        function updateUrl() {
          const params = new URLSearchParams();
          if (searchQuery.value) params.set('q', searchQuery.value);
          if (searchStartDate.value) params.set('startDate', searchStartDate.value);
          if (searchEndDate.value) params.set('endDate', searchEndDate.value);
          if (categoryId.value) params.set('categoryId', categoryId.value);
          if (page.value > 1) params.set('page', page.value);
          const url = 'search.html' + (params.toString() ? '?' + params.toString() : '');
          history.replaceState(null, '', url);
        }

        async function doSearch() {
          const q = searchQuery.value.trim();
          if (!q && !searchStartDate.value && !searchEndDate.value) {
            showToast('请输入关键词或选择日期范围', 'error'); return;
          }
          searched.value = true;
          page.value = 1;
          updateUrl();
          await fetchList();
        }

        async function fetchList() {
          loading.value = true;
          try {
            const data = await NewsAPI.search(searchQuery.value, page.value, searchStartDate.value || undefined, searchEndDate.value || undefined, categoryId.value);
            list.value = data && data.NewsList ? data.NewsList : (Array.isArray(data) ? data : []);
            total.value = data && data.total != null ? data.total : list.value.length;
          } catch (e) { showToast(e.message, 'error'); list.value = []; }
          finally { loading.value = false; }
        }

        function clearSearch() {
          window.location.href = 'index.html';
        }

        function goPage(p) { page.value = p; updateUrl(); fetchList(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function goDetail(id) { window.location.href = 'detail.html?id=' + id + '&from=search'; }
        function goHome() { window.location.href = 'index.html'; }

        onMounted(() => {
          const params = new URLSearchParams(window.location.search);
          const q = params.get('q');
          const sd = params.get('startDate');
          const ed = params.get('endDate');
          const cid = params.get('categoryId');
          const p = params.get('page');
          if (q || sd || ed) {
            searchQuery.value = q || '';
            searchStartDate.value = sd || '';
            searchEndDate.value = ed || '';
            categoryId.value = parseInt(cid) || 0;
            page.value = parseInt(p) || 1;
            searched.value = true;
            fetchList();
          }
        });

        return {
          searchQuery, searchStartDate, searchEndDate, list, total, page, loading, searched, toast,
          totalPages, pageNumbers,
          doSearch, clearSearch, goPage, goDetail, goHome,
        };
      },
    }).mount('#app');
  </script>
</body>
</html>
